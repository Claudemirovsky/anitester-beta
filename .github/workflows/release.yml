name: Build and upload artifacts
on:
  workflow_dispatch:
    inputs:
      git-repo:
        description: Git repo (Optional, defaults to <your name>/aniyomi-extensions-tester
        required: false
      git-branch:
        description: Git branch (optional, defaults to proguard)
        default: proguard
        required: false
env:
    REPO: ${{ github.event.inputs.git-repo }}

jobs:
  build-tester:
    runs-on: ubuntu-latest
    steps:
      - name: Check inputs
        if: env.REPO == ''
        run: |
          set -e
          echo "REPO=${{ github.repository_owner }}/aniyomi-extensions-tester" >> $GITHUB_ENV
      - name: Clone Repository (Latest)
        uses: actions/checkout@v3
        with:
          repository: ${{ env.REPO }}
          fetch-depth: 0
          ref: ${{ github.event.inputs.git-branch }}

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: 11
          distribution: adopt

      - name: Create the android.jar
        run: ./AndroidCompat/getAndroid.sh

      - name: Build the tester
        uses: gradle/gradle-build-action@v2.3.3
        with:
          arguments: :server:optimizeShadowJar
          gradle-home-cache-cleanup: true
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Compiled-things
          path: |
            server/build/aniyomi-extensions-tester-v*.jar
            server/build/min/*
          retention-days: 1

